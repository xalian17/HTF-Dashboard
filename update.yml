name: Update BTC Compass

on:
  schedule:
    # Top of every hour (UTC). GitHub cron is not second-precise (can lag 0–15 min under
    # load) — fine for an hourly macro refresh. The open dashboard polls every 5 min and
    # re-renders when meta.generated changes, so it picks up each hourly build on its own.
    - cron: "0 * * * *"
  workflow_dispatch:        # force an immediate refresh by hand from the Actions tab
  push:
    branches: [main]        # rebuild on commits (e.g. after editing manual.json)

permissions:
  contents: write           # to commit data.json
  pages: write              # to deploy
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and build data.json
        run: python fetch.py

      - name: Commit data.json if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.json
          git diff --staged --quiet || git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .              # serves index.html + data.json from repo root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
