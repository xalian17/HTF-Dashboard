name: Calibration Audit

on:
  workflow_dispatch:

jobs:
  calibrate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run recent calibration audit
        run: |
          python calibrate.py --recent | tee calibration_recent.txt

      - name: Run full calibration audit
        run: |
          python calibrate.py | tee calibration_full.txt

      - name: Upload calibration outputs
        uses: actions/upload-artifact@v4
        with:
          name: calibration-audit
          path: |
            calibration_recent.txt
            calibration_full.txt
